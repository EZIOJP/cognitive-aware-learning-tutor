<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Scaler Lecture Audio</title>
    <style>
      * { box-sizing: border-box; }
      body {
        font-family: system-ui, sans-serif;
        width: 360px;
        margin: 0;
        padding: 12px;
        background: #022c22;
        color: #d1fae5;
        font-size: 13px;
      }
      h1 { font-size: 15px; margin: 0 0 8px; color: #6ee7b7; }
      p { margin: 0 0 10px; color: #a7f3d0; line-height: 1.45; font-size: 12px; }
      button {
        width: 100%;
        margin: 4px 0;
        padding: 8px 10px;
        border: 1px solid #059669;
        border-radius: 8px;
        background: #064e3b;
        color: #ecfdf5;
        cursor: pointer;
        font-size: 12px;
      }
      button:hover { background: #047857; }
      button.primary { background: #059669; font-weight: 600; }
      button:disabled { opacity: 0.5; cursor: not-allowed; }
      #urls { max-height: 140px; overflow-y: auto; margin: 8px 0; }
      .url-row {
        display: flex;
        gap: 6px;
        align-items: flex-start;
        margin-bottom: 6px;
        padding: 6px;
        background: #0f3d32;
        border-radius: 6px;
        font-size: 10px;
        word-break: break-all;
      }
      .url-row button { width: auto; flex-shrink: 0; padding: 4px 8px; margin: 0; }
      #status { font-size: 11px; color: #86efac; min-height: 2em; margin-top: 8px; }
      .hint { font-size: 10px; color: #6ee7b780; margin-top: 10px; }
    </style>
  </head>
  <body>
    <h1>Scaler lecture audio</h1>
    <p>Download audio/video for <strong>Whisper</strong> in Transcript Notes Studio. Use only for courses you're enrolled in.</p>

    <button type="button" class="primary" id="scan">Scan this tab</button>
    <div id="urls"></div>

    <button type="button" id="record">Record audio (play video)</button>
    <button type="button" id="stop" disabled>Stop recording</button>

    <div id="status"></div>
    <p class="hint">
      After download: Transcript Notes Studio → Transcribe audio → Summarize.
      HLS downloads as .ts (Whisper accepts it). For .mp4/.webm, use directly.
    </p>
    <script src="popup.js"></script>
  </body>
</html>
